name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Stage Pages artifact
        run: |
          set -euo pipefail
          publish_dir="${RUNNER_TEMP}/pages-publish"
          rm -rf "${publish_dir}"
          mkdir -p "${publish_dir}"

          cp -R website "${publish_dir}/website"
          cp -R docs "${publish_dir}/docs"
          cp ACADEMIC_LICENSE.md COMMERCIAL_LICENSE.md "${publish_dir}/"

          cat > "${publish_dir}/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <meta http-equiv="refresh" content="0; url=website/">
          <link rel="canonical" href="https://knowdyn.github.io/terafab-decision-twin/website/">
          <title>Terafab Decision Twin</title>
          </head>
          <body>
          <main>
          <h1>Terafab Decision Twin</h1>
          <p>Opening the stakeholder brief. If you are not redirected, <a href="website/">open the website</a>.</p>
          </main>
          </body>
          </html>
          HTML

          python - <<'PY'
          from html import escape
          import os
          from pathlib import Path

          publish_dir = Path(os.environ["RUNNER_TEMP"]) / "pages-publish"
          aliases = {
              "docs/index.html": "docs/index.md",
              "docs/evidence.html": "docs/EVIDENCE_POLICY.md",
              "docs/model.html": "docs/EQUATIONS.md",
              "docs/validation-lab.html": "docs/VALIDATION_LAB.md",
              "docs/decision-surfaces.html": "docs/STAKEHOLDER_DECISION_SURFACES.md",
          }

          for alias, target in aliases.items():
              target_path = publish_dir / target
              if not target_path.is_file():
                  raise SystemExit(f"Missing reference target for {alias}: {target}")
              title = target_path.stem.replace("_", " ").title()
              body = escape(target_path.read_text(encoding="utf-8"))
              (publish_dir / alias).write_text(
                  "<!doctype html>\n"
                  "<html lang=\"en\">\n"
                  "<head>\n"
                  "<meta charset=\"utf-8\">\n"
                  "<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n"
                  f"<title>{escape(title)} | Terafab Decision Twin Reference Wiki</title>\n"
                  "</head>\n"
                  "<body>\n"
                  f"<main><h1>{escape(title)}</h1><p>Reference source: <a href=\"{escape(Path(target).name)}\">{escape(target)}</a></p><pre>\n{body}\n</pre></main>\n"
                  "</body>\n"
                  "</html>\n",
                  encoding="utf-8",
              )
          PY
      - name: Verify website links in staged artifact
        run: |
          set -euo pipefail
          publish_dir="${RUNNER_TEMP}/pages-publish"
          python - <<'PY'
          from html.parser import HTMLParser
          import os
          from pathlib import Path
          from urllib.parse import urlparse

          publish_dir = Path(os.environ["RUNNER_TEMP"]) / "pages-publish"
          root_index = publish_dir / "index.html"
          index = publish_dir / "website" / "index.html"

          if not root_index.is_file():
              raise SystemExit("Missing root index.html redirect for project Pages URL")
          root_text = root_index.read_text(encoding="utf-8")
          if 'url=website/' not in root_text or 'href="website/"' not in root_text:
              raise SystemExit("Root index.html does not redirect/link to website/")

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key in {"href", "src"} and value:
                          self.hrefs.append(value)

          parser = LinkParser()
          parser.feed(index.read_text(encoding="utf-8"))
          missing = []
          for href in parser.hrefs:
              parsed = urlparse(href)
              if parsed.scheme or parsed.netloc or href.startswith("#"):
                  continue
              candidate = (index.parent / parsed.path).resolve()
              try:
                  candidate.relative_to(publish_dir.resolve())
              except ValueError:
                  missing.append((href, "escapes publish artifact"))
                  continue
              if not candidate.exists():
                  missing.append((href, str(candidate)))
          required = [
              "../docs/index.html",
              "../docs/evidence.html",
              "../docs/model.html",
              "../docs/validation-lab.html",
              "../docs/decision-surfaces.html",
              "../ACADEMIC_LICENSE.md",
              "../COMMERCIAL_LICENSE.md",
          ]
          for href in required:
              if href not in parser.hrefs:
                  missing.append((href, "required link not present in website/index.html"))
          if missing:
              for href, reason in missing:
                  print(f"Missing {href}: {reason}")
              raise SystemExit(1)
          print("Verified staged website links, including reference-wiki aliases and license files")
          PY
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages-publish
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
